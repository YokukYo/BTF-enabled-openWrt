name: OpenWrt Builder (dae binary)

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:

  check:
    runs-on: ubuntu-22.04
    outputs:
      need_build: ${{ steps.compare.outputs.need_build }}
      latest_hash: ${{ steps.compare.outputs.latest_hash }}

    steps:
      - name: Compare upstream hash
        id: compare
        run: |
          LATEST=$(git ls-remote $REPO_URL refs/heads/$REPO_BRANCH | cut -f1)
          echo "latest_hash=$LATEST" >> $GITHUB_OUTPUT

          OLD=""
          if gh release view last-build-hash \
            --repo ${{ github.repository }} >/dev/null 2>&1; then
            OLD=$(gh release view last-build-hash \
              --repo ${{ github.repository }} \
              --json body \
              -q .body)
          fi

          if [ "$LATEST" = "$OLD" ]; then
            echo "need_build=false" >> $GITHUB_OUTPUT
          else
            echo "need_build=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check
    if: needs.check.outputs.need_build == 'true'
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            fastjar flex gawk gettext gcc-multilib g++-multilib git gperf \
            haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip \
            p7zip-full patch pkgconf python3 python3-pyelftools \
            python3-setuptools qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
            xmlto xxd zlib1g-dev dwarves file
          sudo apt-get autoremove -y
          sudo apt-get clean
          pahole --version

      - name: Prepare workdir
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: /workdir/openwrt/dl
          key: openwrt-dl-${{ env.REPO_BRANCH }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /workdir/.ccache
          key: openwrt-ccache-${{ env.REPO_BRANCH }}

      - name: Clone source
        run: |
          cd /workdir
          git clone \
            --depth=1 \
            $REPO_URL \
            -b $REPO_BRANCH \
            openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Setup ccache
        run: |
          mkdir -p /workdir/.ccache
          export CCACHE_DIR=/workdir/.ccache
          ccache --set-config=max_size=5G
          ccache -z

      - name: Load custom files
        run: |
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load config
        run: |
          mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        run: |
          export CCACHE_DIR=/workdir/.ccache
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) BUILD_LOG=1 CONFIG_CCACHE=y \
          || make -j1 V=s CONFIG_CCACHE=y

      - name: Organize firmware
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: ${{ env.FIRMWARE }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-${{ github.run_number }}
          files: ${{ env.FIRMWARE }}/*
          body: |
            OpenWrt 24.10 x86/64
            dae official binary (prebuilt)
            BTF enabled

      - name: Save upstream hash
        run: |
          gh release delete last-build-hash \
            --repo ${{ github.repository }} \
            --yes || true
          gh release create last-build-hash \
            --repo ${{ github.repository }} \
            --title "last-build-hash" \
            --notes "${{ needs.check.outputs.latest_hash }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
